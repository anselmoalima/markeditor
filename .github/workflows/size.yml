name: Bundle Size

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/bob-editor/src/**'
      - 'packages/bob-editor/package.json'
      - 'packages/bob-editor/tsup.config.ts'
      - 'packages/bob-editor/size-limit.json'

jobs:
  size:
    name: Check bundle size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install base deps
        working-directory: base
        run: pnpm install --frozen-lockfile

      - name: Build base
        working-directory: base
        run: pnpm --filter bob-editor build

      - name: Install PR deps
        working-directory: pr
        run: pnpm install --frozen-lockfile

      - name: Build PR
        working-directory: pr
        run: pnpm --filter bob-editor build

      - name: Check size (PR)
        working-directory: pr
        run: pnpm --filter bob-editor size
        continue-on-error: true
        id: size-check

      - name: Comment size diff
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const outcome = '${{ steps.size-check.outcome }}';
            const status = outcome === 'success' ? '✅ Bundle size within limits' : '❌ Bundle size limit exceeded';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${status}\n\nRun \`pnpm --filter bob-editor size\` locally for details.`
            });
